---
- name: Configuración remota con Ansible
  hosts: all
  become: yes
  tasks:
    - name: Crear directorio con permisos
      file:
        path: /home/ec2-user/mi_directorio
        state: directory
        mode: '0700'

    - name: Crear archivo dentro del directorio
      file:
        path: /home/ec2-user/mi_directorio/mi_archivo.txt
        state: touch
        mode: '0600'